name: Beta release

on:
  push:
    tags: ["v*-beta.*"]

permissions:
  contents: write

jobs:
  artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: runner.os == 'macOS'
        with:
          ref: v0.1.0-beta.1
          path: prior-source
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master, reviewed 2026-07-15
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Verify tag and target
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          test "$GITHUB_REF_NAME" = "v$version"
          test "$(rustc -vV | sed -n 's/^host: //p')" = "${{ matrix.target }}"
      - name: Verify Linux release gate
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/release-gate.sh
      - name: Build pinned prior-version artifact
        if: runner.os == 'macOS'
        shell: bash
        run: DIST_DIR="$RUNNER_TEMP/prior-dist" bash prior-source/scripts/package-release.sh
      - name: Build and verify Apple Silicon artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          bash scripts/check-docs.sh
          bash scripts/check-plugin.sh
          cargo fmt --check
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo test --locked --all-targets
          bash scripts/package-release.sh
          bash scripts/test-privacy-scan.sh
          archive="target/release-dist/codex-usage-watch-$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)-${{ matrix.target }}.tar.gz"
          prior_archive="$RUNNER_TEMP/prior-dist/codex-usage-watch-0.1.0-beta.1-${{ matrix.target }}.tar.gz"
          bash scripts/verify-release-lifecycle.sh \
            "$archive" target/release-dist/SHA256SUMS \
            "$prior_archive" "$RUNNER_TEMP/prior-dist/SHA256SUMS"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: runner.os == 'Linux'
        with:
          name: release-${{ matrix.target }}
          path: |
            target/release-dist/*.tar.gz
            target/release-dist/SHA256SUMS
            target/release-dist/*.crate
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: runner.os == 'macOS'
        with:
          name: release-${{ matrix.target }}
          path: |
            target/release-dist/*.tar.gz
            target/release-dist/SHA256SUMS
          if-no-files-found: error

  publish:
    needs: artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-assets
      - name: Build combined checksum file
        shell: bash
        run: |
          find release-assets -type f -name '*.tar.gz' -exec cp {} . \;
          find release-assets -type f -name '*.crate' -exec cp {} . \;
          sha256sum ./*.tar.gz > SHA256SUMS
      - name: Publish checksummed prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              ./*.tar.gz ./*.crate SHA256SUMS \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Codex Usage Watch $GITHUB_REF_NAME" \
              --prerelease \
              --draft=false
          else
            gh release create "$GITHUB_REF_NAME" \
              ./*.tar.gz \
              ./*.crate \
              SHA256SUMS \
              --repo "$GITHUB_REPOSITORY" \
              --title "Codex Usage Watch $GITHUB_REF_NAME" \
              --generate-notes \
              --prerelease \
              --verify-tag
          fi
