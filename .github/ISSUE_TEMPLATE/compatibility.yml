name: Compatibility report
description: Report a Codex version, model, schema, or platform change
title: "[Compatibility]: "
labels: [compatibility]
body:
  - type: markdown
    attributes:
      value: This public form is for compatibility feedback, not vulnerabilities. Never attach private Codex data.
  - type: input
    id: versions
    attributes:
      label: Tracker and Codex versions
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS and architecture
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Sanitized doctor --compat result and observed behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include transcripts, prompts, responses, source code, local paths, or databases.
          required: true
