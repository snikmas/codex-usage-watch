name: Documentation problem
description: Report unclear, missing, or incorrect public guidance
title: "[Docs]: "
labels: [documentation]
body:
  - type: input
    id: page
    attributes:
      label: Page or section
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What was unclear or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
