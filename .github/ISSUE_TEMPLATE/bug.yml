name: Bug report
description: Report a reproducible problem without private data
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never attach transcripts, prompts, responses, source code, display.json, or state.sqlite3. Report vulnerabilities privately at https://github.com/snikmas/codex-watch/security/advisories/new.
  - type: input
    id: version
    attributes:
      label: Tracker version
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS and architecture
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction and expected behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized doctor output
      description: Review doctor --json or a support bundle before pasting it.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed local paths, transcripts, prompts, responses, source code, and databases.
          required: true
